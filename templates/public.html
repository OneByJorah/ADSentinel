<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DirWatch — Public Status</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'JetBrains Mono', monospace; background: #0d0d0c; color: #e8e4d6; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
.container { max-width: 600px; padding: 2rem; text-align: center; }
.status-card { background: #15140f; border: 2px solid rgba(255,179,0,0.22); border-radius: 16px; padding: 3rem; }
.status-icon { font-size: 80px; margin-bottom: 1rem; }
.status-title { font-size: 1.8rem; font-weight: 700; margin-bottom: 0.5rem; }
.status-detail { font-size: 1rem; color: #8a8675; margin-bottom: 2rem; }
.status-badge { display: inline-block; padding: 0.5rem 1.5rem; border-radius: 20px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; }
.badge-online { background: rgba(16,185,129,0.15); color: #10b981; border: 1px solid rgba(16,185,129,0.3); }
.badge-degraded { background: rgba(255,179,0,0.15); color: #FFB300; border: 1px solid rgba(255,179,0,0.3); }
.uptime { font-size: 0.85rem; color: #8a8675; margin-top: 2rem; }
.brand { font-size: 0.75rem; color: #FFB300; margin-top: 1rem; letter-spacing: 0.1em; }
</style>
</head>
<body>
<div class="container">
  <div class="status-card">
    <div class="status-icon">{% if status == 'OPERATIONAL' %}🟢{% else %}🟡{% endif %}</div>
    <div class="status-title">{{ status }}</div>
    <div class="status-detail">{{ online }} / {{ total }} datacenters online</div>
    <div class="status-badge {% if status == 'OPERATIONAL' %}badge-online{% else %}badge-degraded{% endif %}">● {{ status }}</div>
    <div class="uptime">DirWatch — datacenter fleet monitor</div>
    <div class="brand">JORAHONE NOC</div>
  </div>
</div>
</body>
</html>
