<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DC Status — Public Status</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Space Grotesk', sans-serif; background: #080d1a; color: #e2e8f0; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
.container { max-width: 600px; padding: 2rem; text-align: center; }
.status-card { background: #0d1526; border: 2px solid rgba(99,179,237,0.22); border-radius: 16px; padding: 3rem; }
.status-icon { font-size: 80px; margin-bottom: 1rem; }
.status-title { font-size: 1.8rem; font-weight: 700; margin-bottom: 0.5rem; }
.status-detail { font-size: 1rem; color: #94a3b8; margin-bottom: 2rem; font-family: 'JetBrains Mono', monospace; }
.status-badge { display: inline-block; padding: 0.5rem 1.5rem; border-radius: 20px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; }
.badge-online { background: rgba(16,185,129,0.15); color: #10b981; border: 1px solid rgba(16,185,129,0.3); }
.badge-maintenance { background: rgba(245,158,11,0.15); color: #f59e0b; border: 1px solid rgba(245,158,11,0.3); }
.uptime { font-size: 0.85rem; color: #64748b; margin-top: 2rem; }
</style>
</head>
<body>
<div class="container">
  <div class="status-card">
    <div class="status-icon">🟢</div>
    <div class="status-title">All Systems Operational</div>
    <div class="status-detail">No incidents at this time</div>
    <div class="status-badge badge-online">● Online</div>
    <div class="uptime">Uptime: 15d 8h 42m</div>
  </div>
</div>
</body>
</html>
